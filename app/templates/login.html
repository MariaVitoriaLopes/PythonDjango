{% extends 'template.html' %}

{% block titulo %}Login{% endblock %}

{% block conteudo %}
<style>
    /* Estiliza os inputs automáticos gerados pelo form.as_p */
    .content-box p input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        background: #0d0621 !important;
        border: 1px solid #3d1d75 !important;
        color: #ffffff !important;
        border-radius: 6px;
        box-shadow: none !important;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .content-box p input:focus {
        border-color: #00ffff !important;
        box-shadow: 0 0 8px rgba(0, 255, 255, 0.5) !important;
        outline: 0;
    }
    .content-box p label {
        font-size: 13px;
        font-weight: bold;
        color: #cbd5e1;
        margin-bottom: 5px;
        margin-top: 10px;
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="content-box" style="background: linear-gradient(135deg, #130b30 0%, #0a041c 100%); border: 1px solid #8a2be2; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); padding: 30px;">
                <h3 class="fw-bold text-white mb-4 text-center" style="text-shadow: 0 0 10px #8a2be2;">Login do Cliente</h3>

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn w-100 mt-4 text-white fw-bold py-2" style="background-color: #8a2be2; box-shadow: 0 0 12px #8a2be2; border: none;">Entrar</button>
                </form>
                
                <div class="text-center mt-3">
                    <span class="small" style="color: #ffffff50;">Novo na loja? <a href="{% url 'cadastro' %}" style="color: #00ffff; font-weight: bold; text-decoration: none;">Cadastre-se aqui</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
