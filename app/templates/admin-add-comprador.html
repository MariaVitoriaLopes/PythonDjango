{% extends 'template.html' %}

{% block titulo %}Cadastrar Novo Comprador{% endblock %}

{% block conteudo %}
<style>
    /* Ajuste para estilizar os inputs automáticos do Django form.as_p */
    .content-box p input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        background: #0d0621 !important;
        border: 1px solid #3d1d75 !important;
        color: #ffffff !important;
        border-radius: 6px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .content-box p input:focus {
        border-color: #00ffff !important;
        box-shadow: 0 0 8px rgba(0, 255, 255, 0.5) !important;
        outline: 0;
    }
    .content-box p label {
        font-size: 13px;
        font-weight: bold;
        color: #cbd5e1;
        margin-bottom: 5px;
        margin-top: 10px;
    }
    .content-box .helptext, .content-box .text-muted {
        display: block;
        font-size: 11px;
        color: #ffffff50 !important;
        margin-top: 4px;
    }
</style>

<div class="container py-5 d-flex justify-content-center">
    <div class="content-box w-100" style="max-width: 650px; background: linear-gradient(135deg, #130b30 0%, #0a041c 100%); border: 1px solid #8a2be2; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); padding: 35px;">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white mb-2" style="text-shadow: 0 0 10px #8a2be2;">➕ NOVO COMPRADOR</h2>
            <p class="text-white-50 small">Painel de Administração: Registre uma nova conta de cliente na base de dados.</p>
        </div>

        <form method="POST" action="{% url 'admin_add_comprador' %}">
            {% csrf_token %}
            
            {{ form.as_p }}

            <div class="row mt-4">
                <div class="col-md-6 mb-2">
                    <button type="submit" class="btn w-100 fw-bold text-white py-2.5" style="background-color: #8a2be2; box-shadow: 0 0 12px #8a2be2; border: none;">
                        REGISTRAR CLIENTE
                    </button>
                </div>
                <div class="col-md-6">
                    <a href="{% url 'listarusuarios' %}" class="btn w-100 fw-bold text-info py-2.5" style="background-color: transparent; border: 1px solid #00ffff; box-shadow: 0 0 8px rgba(0, 255, 255, 0.2); text-decoration: none; text-align: center; display: block;">
                        VOLTAR
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
